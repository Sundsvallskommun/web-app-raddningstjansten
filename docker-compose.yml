services:
  backend:
    build:
      context: ./backend
    container_name: raddningstjansten-backend
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      BASE_URL_PREFIX: ${BASE_URL_PREFIX:-/api}
      SECRET_KEY: ${SECRET_KEY:?err}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      CREDENTIALS: ${CREDENTIALS:-true}
      API_BASE_URL: ${API_BASE_URL:?err}
      CLIENT_KEY: ${CLIENT_KEY:?err}
      CLIENT_SECRET: ${CLIENT_SECRET:?err}
      MUNICIPALITY_ID: ${MUNICIPALITY_ID:-2281}
      # Mock citizens: comma-separated, parallel lists of personId + personnummer.
      CITIZEN_PERSON_ID: ${CITIZEN_PERSON_ID:?err}
      CITIZEN_PERSON_NUMBER: ${CITIZEN_PERSON_NUMBER:?err}
      # Shared password required to complete the mock citizen login.
      CITIZEN_LOGIN_PASSWORD: ${CITIZEN_LOGIN_PASSWORD:?err}
      # Admin SAML (fake SSO IdP)
      SAML_ENTRY_SSO: ${SAML_ENTRY_SSO:?err}
      SAML_CALLBACK_URL: ${SAML_CALLBACK_URL:?err}
      SAML_LOGOUT_CALLBACK_URL: ${SAML_LOGOUT_CALLBACK_URL:-}
      SAML_SUCCESS_REDIRECT: ${SAML_SUCCESS_REDIRECT:?err}
      SAML_FAILURE_REDIRECT: ${SAML_FAILURE_REDIRECT:?err}
      SAML_ISSUER: ${SAML_ISSUER:-web-app-raddningstjansten}
      SAML_IDP_PUBLIC_CERT: ${SAML_IDP_PUBLIC_CERT:?err}
      # Editor (full) groups + the read-only viewer group.
      ADMIN_GROUP: ${ADMIN_GROUP:-Raddningstjansten-AVD-CHEFER,Raddningstjansten-AVD-EDITOR}
      VIEWER_GROUP: ${VIEWER_GROUP:-Raddningstjansten-AVD-VIEWER}
      # Test SSO (mocked handläggare). Empty values keep it disabled.
      EMPLOYEE_LOGIN_PASSWORD: ${EMPLOYEE_LOGIN_PASSWORD:-}
      TESTSSO_DATABASE_URL: ${TESTSSO_DATABASE_URL:-mysql://testsso:testsso@testsso-db:3306/testsso}
      # rtj-management errand API (no WSO2 token)
      RTJ_MANAGEMENT_BASE_URL: ${RTJ_MANAGEMENT_BASE_URL:?err}
      RTJ_NAMESPACE: ${RTJ_NAMESPACE:-EGENSOTNING}
      RTJ_DEFAULT_ASSIGNEE: ${RTJ_DEFAULT_ASSIGNEE:-bsk-handlaggare}
      RTJ_PROCESS_DEFINITION: ${RTJ_PROCESS_DEFINITION:-Hantera ansökan om egensotning}
    depends_on:
      - testsso-db
    networks:
      - raddningstjansten

  # Test-SSO user store (the "users-database" Dokploy service). Holds the three
  # seeded mock handläggare; the backend creates the table + seeds on startup.
  testsso-db:
    image: mysql:8
    container_name: raddningstjansten-testsso-db
    # Publish 3306 to the host so a locally-run backend (yarn dev) can connect
    # via localhost. In-cluster (compose/Dokploy) the backend uses the service
    # name "testsso-db" instead and doesn't need the published port.
    ports:
      - "${TESTSSO_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${TESTSSO_DB_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${TESTSSO_DB_NAME:-testsso}
      MYSQL_USER: ${TESTSSO_DB_USER:-testsso}
      MYSQL_PASSWORD: ${TESTSSO_DB_PASSWORD:-testsso}
    volumes:
      - testsso-db-data:/var/lib/mysql
    networks:
      - raddningstjansten

  frontend:
    build:
      context: ./frontend
    container_name: raddningstjansten-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      # Host the nginx proxy forwards /api to (the backend service)
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
    depends_on:
      - backend
    networks:
      - raddningstjansten

volumes:
  testsso-db-data:

networks:
  raddningstjansten:
    driver: bridge
