# Serves the built SPA and proxies /api to the backend (BFF).
# BACKEND_URL is substituted at container start by the nginx image's envsubst
# (only ${BACKEND_URL} is replaced; plain $nginx_vars are left intact).
#
# In Dokploy, set BACKEND_URL to the backend app's INTERNAL address, e.g.
#   http://raddningstjansten-backend:3000
# so traffic stays on the Docker network and the Host header is irrelevant.

# Preserve the X-Forwarded-Proto set by Dokploy's Traefik (https). Without this
# the BFF would see "http" and drop the Secure session cookie used by SAML.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API -> BFF
    location /api/ {
        # Resolve the backend at REQUEST time (not at startup) using Docker's
        # embedded DNS, so nginx still boots and serves the SPA even if the
        # backend is down, renamed, or BACKEND_URL is misconfigured.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream "${BACKEND_URL}";
        proxy_pass $upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        # Needed only if BACKEND_URL is an https upstream (public domain).
        proxy_ssl_server_name on;
    }

    # SPA fallback - both "/" (citizen) and "/admin" resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
